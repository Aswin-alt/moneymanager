spring.application.name=moneymanager

# ── DevTools ──────────────────────────────────────────────────────────────────
spring.devtools.restart.enabled=false

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/api

# ── MySQL ─────────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/moneymanager?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=12

# ── Redis ────────────────────────────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD:#{null}}
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000

# ── Mail ─────────────────────────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:noreply@moneymanager.com}
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# ── JWT ───────────────────────────────────────────────────────────────────────
# Override JWT_SECRET in production with a 64+ character secure random string
app.jwt.secret=${JWT_SECRET:MoneyManagerDevSecretKey2026ChangeThisInProduction!!ABCDEFGHIJKLMNOPQRSTUVWXYZabcdef}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000
