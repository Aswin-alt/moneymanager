spring.application.name=moneymanager

# ── DevTools ──────────────────────────────────────────────────────────────────
spring.devtools.restart.enabled=false

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/api

# ── MySQL ─────────────────────────────────────────────────────────────────────
# connectTimeout / socketTimeout in ms (5s connect, 30s query)
spring.datasource.url=jdbc:mysql://localhost:3306/moneymanager?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&connectTimeout=5000&socketTimeout=30000
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── HikariCP connection pool ──────────────────────────────────────────────────
# Max time to wait for a connection from the pool (5s)
spring.datasource.hikari.connection-timeout=5000
# Max time a connection can sit idle before being evicted (10 min)
spring.datasource.hikari.idle-timeout=600000
# Max lifetime of a connection in the pool (30 min)
spring.datasource.hikari.max-lifetime=1800000
# Pool size (min 2, max 10)
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
# Query used to validate connection health before use
spring.datasource.hikari.connection-test-query=SELECT 1
# Max time to wait for connection-test-query response (3s)
spring.datasource.hikari.validation-timeout=3000
# Enable leak detection: log warning if connection held > 60s
spring.datasource.hikari.leak-detection-threshold=60000

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=12

# ── Redis ────────────────────────────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD:#{null}}
# Connection and command timeouts (ms)
spring.data.redis.connect-timeout=3000
spring.data.redis.timeout=3000
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000

# ── Mail ─────────────────────────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:noreply@moneymanager.com}
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# ── JWT ───────────────────────────────────────────────────────────────────────
# Override JWT_SECRET in production with a 64+ character secure random string
app.jwt.secret=${JWT_SECRET:MoneyManagerDevSecretKey2026ChangeThisInProduction!!ABCDEFGHIJKLMNOPQRSTUVWXYZabcdef}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000
