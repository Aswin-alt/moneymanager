# Test-only: H2 in-memory database so tests don't require MySQL
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable Flyway for tests — Hibernate DDL creates the schema from entities
spring.flyway.enabled=false

app.jwt.secret=TestSecretKeyForUnitTestingOnlyDoNotUseInProduction2026ABCDEFGHIJKLtest
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# Disable Redis and Mail for tests
spring.cache.type=none
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
